services:
  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt
    container_name: ecosystem-neo4j
    environment:
      NEO4J_AUTH: neo4j/test1234
    volumes:
      - neo4j_data:/data
    networks:
      - ecosystem_net
    healthcheck:
      test: [ "CMD", "cypher-shell", "-u", "neo4j", "-p", "test1234", "RETURN 1" ]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: ecosystem_analyzer/Dockerfile
    ports:
      - "8000:8000"
    container_name: ecosystem-backend
    depends_on:
      neo4j:
          condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
    networks:
      - ecosystem_net

  frontend:
    build: ./UI
    container_name: ecosystem-frontend
    depends_on:
      - backend
    ports:
      - "8501:8501"
    networks:
      - ecosystem_net

volumes:
  neo4j_data:

networks:
  ecosystem_net:
    driver: bridge