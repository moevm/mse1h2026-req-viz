name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'ecosystem_analyzer/**'
      - 'graph/**'
      - 'parser/**'
      - 'tests/integration/**'
      - '**/pyproject.toml'
      - '**/poetry.lock'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ecosystem_analyzer/**'
      - 'graph/**'
      - 'parser/**'
      - 'tests/integration/**'
      - '**/pyproject.toml'
      - '**/poetry.lock'
      - '.github/workflows/**'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "POETRY_NO_INTERACTION=1" >> $GITHUB_ENV

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies (graph module)
        working-directory: graph
        run: poetry install --with dev --no-root

      - name: Install dependencies (parser module)
        working-directory: parser
        run: poetry install --no-root

      - name: Install dependencies (ecosystem_analyzer)
        working-directory: ecosystem_analyzer
        run: poetry install --no-root

      - name: Run Ruff linting
        run: |
          cd graph
          poetry run ruff check . ../ecosystem_analyzer ../parser
        continue-on-error: true

      - name: Run Ruff format check
        run: |
          cd graph
          poetry run ruff format --check . ../ecosystem_analyzer ../parser
        continue-on-error: true

      - name: Run unit tests with coverage
        working-directory: graph
        run: |
          poetry run pytest \
            --cov=./graph \
            --cov=../ecosystem_analyzer \
            --cov=../parser \
            --cov-report=xml \
            --cov-report=term-missing \
            -v

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "POETRY_NO_INTERACTION=1" >> $GITHUB_ENV

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install dependencies (ecosystem_analyzer)
        working-directory: ecosystem_analyzer
        run: poetry install --no-root

      - name: Install integration test dependencies
        working-directory: tests/integration
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start test environment
        working-directory: tests/integration
        run: |
          echo "Starting test environment..."
          timeout 10m docker compose -f docker-compose.test.yml up -d
          echo "Waiting for services to be ready..."

          # Wait for backend health
          timeout 5m bash -c 'until curl -f http://localhost:8001/api/health; do sleep 10; done'
          echo "✓ Backend is ready"

      - name: Run integration tests
        working-directory: tests/integration
        run: |
          echo "Running integration tests..."
          python -m pytest test_graph_api.py -v --tb=short -m integration
        timeout-minutes: 10

      - name: Cleanup test environment
        if: always()
        working-directory: tests/integration
        run: |
          echo "Cleaning up test environment..."
          docker compose -f docker-compose.test.yml down -v || true
          docker system prune -f || true

      - name: Debug logs on failure
        if: failure()
        working-directory: tests/integration
        run: |
          echo "=== Backend logs ==="
          docker logs ecosystem-backend-test || true
          echo "=== Neo4j logs ==="
          docker logs ecosystem-neo4j-test || true
          echo "=== Container status ==="
          docker compose -f docker-compose.test.yml ps || true
