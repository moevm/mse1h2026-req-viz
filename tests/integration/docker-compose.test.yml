services:
  neo4j-test:
    image: neo4j:5
    ports:
      - "7475:7474"
      - "7688:7687"
    container_name: ecosystem-neo4j-test
    environment:
      NEO4J_AUTH: neo4j/test1234
    volumes:
      - neo4j_test_data:/data
    networks:
      - ecosystem_test_net
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "test1234", "RETURN 1"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  backend-test:
    build:
      context: ../../
      dockerfile: ecosystem_analyzer/Dockerfile
    ports:
      - "8001:8000"
    container_name: ecosystem-backend-test
    depends_on:
      neo4j-test:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend-test:8000
      BACKEND_TIMEOUT: "60"
      NEO4J_URI: bolt://neo4j-test:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
      OLLAMA_URL: http://ollama-test:11434/api/generate
      OLLAMA_MODEL: "gemma:2b"
    networks:
      - ecosystem_test_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  ollama-test:
    image: ollama/ollama:latest
    container_name: ecosystem-ollama-test
    networks:
      - ecosystem_test_net
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_test_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        /bin/ollama serve &
        sleep 5
        ollama pull gemma:2b
        wait

volumes:
  neo4j_test_data:
  ollama_test_data:

networks:
  ecosystem_test_net:
    driver: bridge
